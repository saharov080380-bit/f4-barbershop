name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  #  Тесты бэкенда 
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: barbershop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations and tests
        env:
          POSTGRES_DB: barbershop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          SECRET_KEY: test-secret-key
          DEBUG: "True"
        run: |
          cd backend
          python manage.py makemigrations api
          python manage.py migrate
          python manage.py test --verbosity=2

  #  Тесты фронтенда 
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --prefix frontend

      - name: Run tests
        run: npm test --prefix frontend -- --watchAll=false --passWithNoTests

  #  Сборка Docker-образов 
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t barbershop-backend ./backend

      - name: Build frontend image
        run: docker build -t barbershop-frontend ./frontend

  #  деплой на сервер (только при пуше в main) 
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 30m
          script: |
            cd /opt/barbershop
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate
            # миграции применяются автоматически внутри entrypoint.sh при старте backend,
            # отдельная команда здесь не нужна и ломалась с ошибкой 409
