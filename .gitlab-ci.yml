stages:
  - build
  - deploy

variables:
  BACKEND_IMAGE:  $CI_REGISTRY_IMAGE/backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend

# ── BUILD ──────────────────────────────────────────────────────────────────────

build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - echo -n $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - docker build
        --cache-from $BACKEND_IMAGE:latest
        --tag $BACKEND_IMAGE:$CI_COMMIT_SHA
        --tag $BACKEND_IMAGE:latest
        ./backend
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHA
    - docker push $BACKEND_IMAGE:latest

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - echo -n $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - docker build
        --cache-from $FRONTEND_IMAGE:latest
        --tag $FRONTEND_IMAGE:$CI_COMMIT_SHA
        --tag $FRONTEND_IMAGE:latest
        ./frontend
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHA
    - docker push $FRONTEND_IMAGE:latest

# ── DEPLOY (только ветка main) ─────────────────────────────────────────────────

deploy:
  stage: deploy
  only:
    - main
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $VM_IPADDRESS >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - echo "Копируем конфиги на сервер..."
    - scp docker-compose.server.yml nginx.conf $SSH_USER@$VM_IPADDRESS:/opt/barbershop/

    - echo "Деплоим на сервер..."
    - |
      ssh $SSH_USER@$VM_IPADDRESS "
        set -e
        echo -n $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
        cd /opt/barbershop
        export BACKEND_IMAGE=$BACKEND_IMAGE:$CI_COMMIT_SHA
        export FRONTEND_IMAGE=$FRONTEND_IMAGE:$CI_COMMIT_SHA
        docker compose -f docker-compose.server.yml pull
        docker compose -f docker-compose.server.yml up -d --remove-orphans
        docker image prune -f
      "
    - echo "Деплой завершён!"
